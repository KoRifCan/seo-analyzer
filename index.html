<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a12">
<title>YouTube SEO Analyzer</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--bg2:#12121e;--surface:rgba(255,255,255,0.04);--shover:rgba(255,255,255,0.08);--glass:rgba(255,255,255,0.06);--gborder:rgba(255,255,255,0.08);--text:#e8e8f0;--text2:#9090a8;--primary:#6c5ce7;--pglow:rgba(108,92,231,0.3);--accent:#00cec9;--danger:#ff6b6b;--warn:#fdcb6e;--success:#00b894;--radius:16px;--rs:10px;--t:0.3s cubic-bezier(0.4,0,0.2,1)}
[data-theme="light"]{--bg:#f0f0f5;--bg2:#e4e4ec;--surface:rgba(0,0,0,0.03);--glass:rgba(255,255,255,0.7);--gborder:rgba(0,0,0,0.08);--text:#1a1a2e;--text2:#6b6b80}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--t),color var(--t)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,var(--primary) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,var(--accent) 0%,transparent 50%);opacity:0.05;pointer-events:none;z-index:0}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
.header{padding:16px 24px;display:flex;align-items:center;justify-content:space-between;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--gborder);position:sticky;top:0;z-index:100}
.h-left{display:flex;align-items:center;gap:12px}
.h-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:700}
.h-title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.h-actions{display:flex;gap:8px}
.btn-icon{width:36px;height:36px;border:none;border-radius:var(--rs);background:var(--surface);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all var(--t)}
.btn-icon:hover{background:var(--shover);transform:scale(1.05)}
.hero{padding:32px 24px 16px;text-align:center}
.hero h1{font-size:28px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--text2);font-size:14px}
.input-section{padding:0 24px 20px;display:flex;gap:10px;max-width:700px;margin:0 auto;flex-wrap:wrap}
.input-field{flex:1;min-width:200px;padding:12px 16px;background:var(--surface);border:1px solid var(--gborder);border-radius:var(--rs);color:var(--text);font-size:14px;outline:none;transition:all var(--t)}
.input-field:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--pglow)}
.btn-primary{padding:12px 24px;background:linear-gradient(135deg,var(--primary),#a29bfe);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;transition:all var(--t);white-space:nowrap;display:flex;align-items:center;gap:6px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 24px var(--pglow)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{padding:8px 16px;background:var(--surface);color:var(--text);border:1px solid var(--gborder);border-radius:var(--rs);font-size:13px;cursor:pointer;transition:all var(--t)}
.btn-secondary:hover{background:var(--shover)}
.content{max-width:900px;margin:0 auto;padding:0 24px 40px;display:none}
.content.show{display:block}
.results-section{background:var(--surface);border:1px solid var(--gborder);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.video-hero{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
.video-hero img{width:200px;border-radius:var(--rs);flex-shrink:0}
.video-hero-info{flex:1;min-width:200px}
.video-hero-info h2{font-size:20px;font-weight:700;margin-bottom:4px;line-height:1.3}
.video-hero-info .meta{font-size:13px;color:var(--text2);display:flex;gap:16px;flex-wrap:wrap;margin-top:8px}
.meta-item{display:flex;align-items:center;gap:4px}
.score-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:700}
.score-badge.good{background:rgba(0,184,148,0.15);color:var(--success);border:1px solid rgba(0,184,148,0.3)}
.score-badge.ok{background:rgba(253,203,110,0.15);color:var(--warn);border:1px solid rgba(253,203,110,0.3)}
.score-badge.bad{background:rgba(255,107,107,0.15);color:var(--danger);border:1px solid rgba(255,107,107,0.3)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
@media(max-width:640px){.grid-2,.grid-3{grid-template-columns:1fr}}
.stat-card{padding:16px;background:var(--bg2);border-radius:var(--rs);border:1px solid var(--gborder)}
.stat-card .num{font-size:22px;font-weight:700}
.stat-card .lbl{font-size:12px;color:var(--text2);margin-top:2px}
.checks{margin-top:12px;display:flex;flex-direction:column;gap:6px}
.check{padding:10px 12px;background:var(--bg2);border-radius:var(--rs);border:1px solid var(--gborder);display:flex;align-items:flex-start;gap:10px}
.check-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.check-body{flex:1;min-width:0}
.check-title{font-size:13px;font-weight:600;margin-bottom:1px}
.check-detail{font-size:12px;color:var(--text2)}
.check-action{font-size:11px;color:var(--primary);margin-top:3px;display:block}
.pass{color:var(--success)}.fail{color:var(--danger)}.warn{color:var(--warn)}
.editor-form{display:flex;flex-direction:column;gap:12px;margin-top:16px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:13px;font-weight:600;color:var(--text2)}
.form-group textarea,.form-group input{padding:10px 12px;background:var(--bg2);border:1px solid var(--gborder);border-radius:var(--rs);color:var(--text);font-size:13px;outline:none;transition:all var(--t);font-family:inherit}
.form-group textarea:focus,.form-group input:focus{border-color:var(--primary)}
.form-group textarea{resize:vertical;min-height:60px}
.tags-input{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;background:var(--bg2);border:1px solid var(--gborder);border-radius:var(--rs);min-height:42px}
.tag{padding:3px 10px;background:var(--primary);color:#fff;border-radius:5px;font-size:12px;display:flex;align-items:center;gap:4px}
.tag button{background:none;border:none;color:#fff;cursor:pointer;font-size:14px;padding:0;line-height:1}
.tag-input-inner{flex:1;min-width:100px;border:none;background:transparent;color:var(--text);font-size:13px;outline:none}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast-container{position:fixed;top:76px;right:16px;z-index:999;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 16px;border-radius:var(--rs);background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--gborder);color:var(--text);font-size:13px;animation:ti .3s ease,to .3s ease 2.7s forwards;box-shadow:0 8px 32px rgba(0,0,0,0.3);max-width:340px}
@keyframes ti{from{opacity:0;transform:translateX(40px)}to{opacity:1}}
@keyframes to{from{opacity:1}to{opacity:0;transform:translateX(40px)}}
.tab-bar{display:flex;gap:4px;overflow-x:auto;padding:4px;background:var(--surface);border-radius:var(--rs);margin-bottom:16px;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 14px;border:none;border-radius:7px;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;transition:all var(--t);flex-shrink:0}
.tab-btn:hover{color:var(--text);background:var(--shover)}
.tab-btn.active{background:var(--primary);color:#fff}
.tab-body{display:none}
.tab-body.show{display:block}
.highlight{color:var(--accent)}
@media(max-width:640px){
  .header{padding:12px 16px}
  .h-title{font-size:15px}
  .hero{padding:24px 16px 12px}
  .hero h1{font-size:22px}
  .input-section{padding:0 16px 16px;flex-direction:column}
  .input-field{min-width:100%}
  .content{padding:0 16px 30px}
  .video-hero{flex-direction:column}
  .video-hero img{width:100%}
  .results-section{padding:14px}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="h-left"><div class="h-logo">▶</div><span class="h-title">YouTube SEO</span></div>
    <div class="h-actions">
      <button class="btn-icon" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">🌙</button>
    </div>
  </header>

  <div class="hero">
    <h1>YouTube SEO Analyzer</h1>
    <p>Analyze & optimize your YouTube video for search</p>
  </div>

  <div class="input-section">
    <input class="input-field" id="urlInput" type="url" placeholder="https://youtu.be/VIDEO_ID or https://youtube.com/watch?v=..." autocomplete="off">
    <button class="btn-primary" id="analyzeBtn" onclick="analyze()">🔍 Analyze</button>
  </div>

  <div class="content" id="content">
    <div id="mainResults"></div>
  </div>
</div>
<div class="toast-container" id="toast"></div>

<script>
const S={theme:'dark',oembed:null,videoId:null};

function $(id){return document.getElementById(id)}
function toast(m){let c=$('toast'),t=document.createElement('div');t.className='toast';t.textContent=m;c.appendChild(t);setTimeout(()=>t.remove(),3000)}
function toggleTheme(){S.theme=S.theme==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',S.theme==='dark'?'':'light');$('themeBtn').textContent=S.theme==='dark'?'🌙':'☀️'}

function extractId(url){
  if(!url)return null;
  let u=url.trim();
  let m=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|music\.youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/);
  if(m)return m[1];
  m=u.match(/^([a-zA-Z0-9_-]{11})$/);
  return m?m[1]:null;
}

async function fetchOembed(videoId){
  try{
    let url=`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`;
    let r=await fetch(url,{signal:AbortSignal.timeout(8000)});
    if(!r.ok)throw new Error('oEmbed failed');
    return await r.json();
  }catch(e){
    try{
      let url=`https://www.youtube.com/oembed?url=https://youtu.be/${videoId}&format=json`;
      let r=await fetch(url,{signal:AbortSignal.timeout(8000)});
      if(!r.ok)throw new Error('oEmbed failed');
      return await r.json();
    }catch(e2){
      throw new Error('Could not fetch video data. Check the URL.');
    }
  }
}

async function checkThumbnail(videoId){
  for(let qual of ['maxresdefault','sddefault','hqdefault']){
    try{
      let r=await fetch(`https://i.ytimg.com/vi/${videoId}/${qual}.jpg`,{method:'HEAD',signal:AbortSignal.timeout(3000)});
      if(r.ok)return qual;
    }catch(e){}
  }
  return null;
}

// =============== ANALYSIS ===============

function analyzeTitle(title,manualTitle){
  let t=(manualTitle||title||'').trim();
  let r=[];
  if(!t){r.push({i:'❌',t:'Title is empty',d:'Title is the most important YouTube SEO factor.',a:'Add a compelling title (40-60 characters recommended).'});return r;}

  let len=t.length;
  if(len<30)r.push({i:'❌',t:`Title too short (${len} chars)`,d:len<10?'Very short title.':'Aim for 40-60 characters.',a:'Make your title more descriptive (include target keyword).'});
  else if(len<40)r.push({i:'⚠️',t:`Title a bit short (${len} chars)`,d:'Optimal: 40-60 characters.',a:'Consider adding more context while keeping it scannable.'});
  else if(len<70)r.push({i:'✅',t:`Good title length (${len} chars)`,d:'Within optimal range.',a:'Well optimized!'});
  else r.push({i:'⚠️',t:`Title long (${len} chars)`,d:'YouTube truncates long titles in search.',a:'Keep under 70 characters for full display.'});

  // Keyword placement
  let firstWords=t.split(/\s+/).slice(0,3).join(' ');
  if(firstWords.length>5)r.push({i:'✅',t:'Keyword in first 3 words',d:`"${firstWords.substring(0,30)}..."`,a:'Great — important keywords are front-loaded.'});
  else r.push({i:'⚠️',t:'Front-load keywords',d:'Put most important words first in title.',a:'YouTube and Google prioritize the beginning of titles.'});

  // Pipe/bracket separator
  if(t.includes('|')||t.includes('- ')||t.includes('– '))r.push({i:'✅',t:'Clean separator',d:'Using pipes or dashes to organize title.',a:'Good for readability.'});

  // All caps check
  let upper=(t.match(/[A-Z]/g)||[]).length;
  if(upper>t.length*0.5&&t.length>10)r.push({i:'⚠️',t:'Excessive capitalization',d:'Too many uppercase letters.',a:'Use normal capitalization. ALL CAPS can appear spammy.'});

  return r;
}

function analyzeDescription(desc){
  let d=(desc||'').trim();
  let r=[];
  if(!d){r.push({i:'❌',t:'Description is empty',d:'Description helps YouTube understand your video.',a:'Write 200+ characters including target keywords.'});return r;}

  let len=d.length;
  if(len<200)r.push({i:'❌',t:`Description very short (${len} chars)`,d:'Aim for at least 200 characters.',a:'Expand your description with relevant details and keywords.'});
  else if(len<500)r.push({i:'⚠️',t:`Description short (${len} chars)`,d:'Optimal: 500-2000 characters.',a:'Add more context, keywords, and timestamps.'});
  else if(len<2000)r.push({i:'✅',t:`Good description length (${len} chars)`,d:'Well within optimal range.',a:'Great!'});
  else r.push({i:'✅',t:`Detailed description (${len} chars)`,d:'Very comprehensive.',a:'Excellent detail — keeps viewers engaged.'});

  // Links
  let links=(d.match(/https?:\/\/[^\s]+/g)||[]);
  if(links.length>0)r.push({i:'✅',t:`Links: ${links.length}`,d:'Using links in description.',a:'Good for driving traffic. Ensure they open in new tabs.'});
  else r.push({i:'⚠️',t:'No links in description',d:'Add links to social media, website, or related videos.',a:'Use the first 1-2 links for your most important pages.'});

  // Hashtags
  let hashtags=(d.match(/#[a-zA-Z0-9_]+/g)||[]);
  if(hashtags.length>0)r.push({i:hashtags.length<=15?'✅':'⚠️',t:`Hashtags: ${hashtags.length}`,d:hashtags.length>15?'YouTube only shows first 15 hashtags.':`Using ${hashtags.length} hashtags.`,a:hashtags.length>15?'Reduce to 3-5 relevant hashtags.':'Good for discoverability. YouTube allows up to 15.'});
  else r.push({i:'⚠️',t:'No hashtags',d:'Hashtags improve search discovery.',a:'Add 3-5 relevant hashtags in your description.'});

  // Timestamps
  let ts=d.match(/\d+:\d+/g);
  if(ts&&ts.length>1)r.push({i:'✅',t:`Timestamps: ${ts.length}`,d:'Chapters help search indexing.',a:'Great for user experience and SEO.'});
  else r.push({i:'⚠️',t:'No chapter timestamps',d:'Timestamps create video chapters in search.',a:'Add chapter markers (0:00, 1:30, etc.) to your description.'});

  // Keyword density (top words)
  let words=d.toLowerCase().replace(/https?:\/\/[^\s]+/g,'').split(/\s+/).filter(w=>w.length>2&&!/^[#@]/.test(w));
  let stop=new Set('the and for are was you all can has had not its but any how our out use may now see get who try her his its own did got set put say she too per via etc'.split(' '));
  let freq={};
  words.forEach(w=>{w=w.replace(/[^a-z0-9]/g,'');if(w.length>2&&!stop.has(w))freq[w]=(freq[w]||0)+1});
  let top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,3);
  if(top.length)r.push({i:'✅',t:'Top description keywords',d:top.map(([w,c])=>`"${w}" (${c}x)`).join(' · '),a:'Ensure primary keyword appears naturally in first 2 sentences.'});

  return r;
}

function analyzeTags(tags){
  let t=tags||[];
  let r=[];
  let count=t.length;
  if(count===0){r.push({i:'❌',t:'No tags',d:'Tags help YouTube understand your video.',a:'Add 5-15 relevant tags. YouTube uses tags for search.'});return r;}

  if(count<5)r.push({i:'⚠️',t:`Few tags (${count})`,d:'Aim for 5-15 relevant tags.',a:'Expand your tag list with related terms and variations.'});
  else if(count<=15)r.push({i:'✅',t:`Good tag count (${count})`,d:'Within optimal range.',a:'Well optimized!'});
  else r.push({i:'⚠️',t:`Many tags (${count})`,d:'YouTube may ignore excess tags.',a:'Stick to 10-15 highly relevant tags.'});

  // Tag length
  t.forEach(tag=>{
    if(tag.length>50)r.push({i:'⚠️',t:`Tag too long: "${tag.substring(0,30)}..."`,d:'Tags should be short phrases.',a:'Keep individual tags under 50 characters.'});
  });

  // Specificity
  let hasGeneric=t.some(tag=>['video','music','song','funny','new','watch'].includes(tag.toLowerCase()));
  if(hasGeneric)r.push({i:'⚠️',t:'Generic tags found',d:'Avoid single-word generic tags.',a:'Use specific multi-word tags that describe your content.'});

  return r;
}

function analyzeThumbnail(thumbQual,title){
  let r=[];
  if(!thumbQual){r.push({i:'❌',t:'Thumbnail not found',d:'Video may not exist or is private.',a:'Check if the video is accessible.'});return r;}

  if(thumbQual==='maxresdefault')r.push({i:'✅',t:'High-res thumbnail available',d:'maxresdefault (1280x720)',a:'Custom high-res thumbnails perform better in search.'});
  else if(thumbQual==='sddefault')r.push({i:'⚠️',t:'Standard res thumbnail',d:'sddefault (640x480)',a:'Upload a custom 1280x720 thumbnail for better CTR.'});
  else r.push({i:'⚠️',t:'Low-res thumbnail only',d:`${thumbQual}`,a:'Custom thumbnails significantly improve click-through rate.'});

  return r;
}

function analyzeEngagement(oembed){
  let r=[];
  // No engagement data from oEmbed — ask user to input
  r.push({i:'💡',t:'Manual engagement check',d:'For deeper analysis: check likes, views, comments, and CTR in YouTube Studio.',a:'High engagement signals boost SEO. Aim for 5%+ like/view ratio.'});
  return r;
}

function analyzeChannel(oembed){
  let r=[];
  let author=oembed?.author_name||'Unknown';
  let authorUrl=oembed?.author_url||'';
  r.push({i:'✅',t:'Channel found',d:`${author} · ${authorUrl}`,a:'Optimize your channel page with keywords in the description.'});
  return r;
}

function analyzeTiming(videoId){
  // Can't get duration from oEmbed. Note to user.
  return [{i:'💡',t:'Check video duration',d:'Optimal length depends on content type.',a:'Tutorials: 10-20min · Vlogs: 5-10min · Shorts: under 60s'}];
}

// =============== MAIN ===============

async function analyze(){
  let url=$('urlInput').value.trim();
  if(!url){toast('Enter a YouTube URL');return}

  let videoId=extractId(url);
  if(!videoId){toast('Invalid YouTube URL');return}

  let btn=$('analyzeBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Loading...';
  S.videoId=videoId;

  try{
    let oembed=await fetchOembed(videoId);
    S.oembed=oembed;
    let thumbQual=await checkThumbnail(videoId);

    // Show auto-fetched data + editable fields
    showDataForm(oembed,thumbQual,videoId);
    toast('Data loaded! Edit fields below and click Analyze.');
  }catch(e){
    toast('Error: '+e.message);
    // Show manual input form even if fetch fails
    showManualForm(videoId);
  }

  btn.disabled=false;
  btn.innerHTML='🔍 Analyze';
}

function showDataForm(oembed,thumbQual,videoId){
  $('content').classList.add('show');

  let title=oembed.title||'';
  let author=oembed.author_name||'Unknown';
  let authorUrl=oembed.author_url||'#';
  let thumbUrl=oembed.thumbnail_url||`https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;

  $('mainResults').innerHTML=`
    <div class="results-section">
      <div class="video-hero">
        <img src="${thumbUrl}" alt="Thumbnail" crossorigin="anonymous">
        <div class="video-hero-info">
          <h2>${title}</h2>
          <div class="meta">
            <span class="meta-item">📺 <a href="${authorUrl}" target="_blank" rel="noopener" style="color:var(--accent)">${author}</a></span>
            <span class="meta-item">🎬 <a href="https://youtu.be/${videoId}" target="_blank" rel="noopener" style="color:var(--text2)">${videoId}</a></span>
          </div>
        </div>
      </div>
    </div>

    <div class="results-section">
      <h3 style="font-size:15px;font-weight:600;margin-bottom:8px">📝 Edit Video Details</h3>
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Auto-fetched from YouTube. Edit for more accurate analysis.</p>
      <div class="editor-form">
        <div class="form-group">
          <label>Title</label>
          <input type="text" id="editTitle" value="${esc(title)}" maxlength="100">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="editDesc" rows="4" placeholder="Paste video description..."></textarea>
        </div>
        <div class="form-group">
          <label>Tags (press Enter or comma to add)</label>
          <div class="tags-input" id="tagsContainer">
            <input class="tag-input-inner" id="tagInput" placeholder="Type tag and press Enter..." onkeydown="tagKeydown(event)">
          </div>
        </div>
        <button class="btn-primary" onclick="runFullAnalysis()">🚀 Run Full SEO Analysis</button>
      </div>
    </div>
  `;
}

function showManualForm(videoId){
  $('content').classList.add('show');
  $('mainResults').innerHTML=`
    <div class="results-section">
      <h3 style="font-size:15px;font-weight:600;margin-bottom:8px">🎬 Video: ${videoId}</h3>
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Could not auto-fetch. Enter details manually for SEO analysis.</p>
      <div class="editor-form">
        <div class="form-group">
          <label>Video Title</label>
          <input type="text" id="editTitle" maxlength="100" placeholder="Enter video title...">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="editDesc" rows="4" placeholder="Paste video description..."></textarea>
        </div>
        <div class="form-group">
          <label>Tags</label>
          <div class="tags-input" id="tagsContainer">
            <input class="tag-input-inner" id="tagInput" placeholder="Type tag and press Enter..." onkeydown="tagKeydown(event)">
          </div>
        </div>
        <button class="btn-primary" onclick="runFullAnalysis()">🚀 Run Full SEO Analysis</button>
      </div>
    </div>
  `;
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

let tags=[];
function addTag(t){
  let v=t.trim();
  if(!v||tags.includes(v))return;
  tags.push(v);
  renderTags();
}
function removeTag(t){
  tags=tags.filter(x=>x!==t);
  renderTags();
}
function tagKeydown(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    let inp=$('tagInput');
    addTag(inp.value);
    inp.value='';
  }
}
function renderTags(){
  let c=$('tagsContainer');
  if(!c)return;
  let inp=c.querySelector('.tag-input-inner');
  c.innerHTML=tags.map(t=>`<span class="tag">${esc(t)} <button onclick="removeTag('${esc(t)}')">×</button></span>`).join('');
  c.appendChild(inp);
  inp.focus();
}

function runFullAnalysis(){
  let title=$('editTitle')?.value||S.oembed?.title||'';
  let desc=$('editDesc')?.value||'';
  let allTags=[...tags];

  let results={
    title:analyzeTitle(S.oembed?.title,title),
    description:analyzeDescription(desc),
    tags:analyzeTags(allTags),
    thumbnail:analyzeThumbnail('maxresdefault',title),
    channel:analyzeChannel(S.oembed),
    engagement:analyzeEngagement(S.oembed),
    timing:analyzeTiming(S.videoId),
  };

  showResults(results,title,desc,allTags,S.videoId,S.oembed);
}

function showResults(results,title,desc,tags,videoId,oembed){
  // Calculate score
  let all=[];
  Object.values(results).forEach(a=>all.push(...a));
  let total=all.length;
  let passed=all.filter(i=>i.i==='✅').length;
  let warned=all.filter(i=>i.i==='⚠️'||i.i==='💡').length;
  let failed=all.filter(i=>i.i==='❌').length;
  let score=total?Math.round(passed/total*100):0;
  let grade=score>=80?'good':score>=50?'ok':'bad';
  let gradeText=score>=80?'Great SEO!':score>=50?'Needs Work':'Poor';

  let tabKeys=['title','description','tags','thumbnail','channel','engagement','timing'];
  let tabLabels={title:'🎯 Title',description:'📝 Description',tags:'🏷️ Tags',thumbnail:'🖼️ Thumbnail',channel:'📺 Channel',engagement:'❤️ Engagement',timing:'⏱️ Timing'};

  // Render results
  $('mainResults').innerHTML=`
    ${oembed?`
    <div class="results-section">
      <div class="video-hero">
        <img src="${oembed.thumbnail_url||`https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`}" alt="" crossorigin="anonymous">
        <div class="video-hero-info">
          <h2>${esc(title)}</h2>
          <div class="meta">
            <span class="score-badge ${grade}">${score}/100 · ${gradeText}</span>
            <span class="meta-item">✅ ${passed} pass</span>
            <span class="meta-item">⚠️ ${warned} warnings</span>
            <span class="meta-item">❌ ${failed} fails</span>
          </div>
        </div>
      </div>
    </div>`:''}

    <div class="tab-bar" id="resTabBar">
      ${tabKeys.map((k,i)=>`<button class="tab-btn${i===0?' active':''}" data-tab="res-${k}" onclick="switchResTab('res-${k}')">${tabLabels[k]}</button>`).join('')}
    </div>

    ${tabKeys.map((k,i)=>`
      <div class="tab-body${i===0?' show':''}" id="res-${k}">
        <div class="checks">
          ${(results[k]||[]).map(item=>`
            <div class="check">
              <div class="check-icon ${item.i==='✅'?'pass':item.i==='❌'?'fail':item.i==='⚠️'?'warn':'warn'}">${item.i}</div>
              <div class="check-body">
                <div class="check-title">${item.t}</div>
                ${item.d?`<div class="check-detail">${item.d}</div>`:''}
                ${item.a?`<div class="check-action">💡 ${item.a}</div>`:''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('')}
  `;

  // Scroll to results
  $('content').scrollIntoView({behavior:'smooth',block:'start'});
}

function switchResTab(tabId){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.tab-btn[data-tab="${tabId}"]`)?.classList.add('active');
  document.querySelectorAll('.tab-body').forEach(b=>b.classList.remove('show'));
  $(tabId)?.classList.add('show');
}

// Init
document.addEventListener('DOMContentLoaded',()=>{document.documentElement.setAttribute('data-theme','')});
$('urlInput').addEventListener('keydown',e=>{if(e.key==='Enter')analyze()});
</script>
</body>
</html>
