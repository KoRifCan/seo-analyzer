<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a12">
<title>YouTube SEO Analyzer</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--bg2:#12121e;--surface:rgba(255,255,255,0.04);--shover:rgba(255,255,255,0.08);--glass:rgba(255,255,255,0.06);--gborder:rgba(255,255,255,0.08);--text:#e8e8f0;--text2:#9090a8;--primary:#6c5ce7;--pglow:rgba(108,92,231,0.3);--accent:#00cec9;--danger:#ff6b6b;--warn:#fdcb6e;--success:#00b894;--radius:16px;--rs:10px;--t:0.3s cubic-bezier(0.4,0,0.2,1)}
[data-theme="light"]{--bg:#f0f0f5;--bg2:#e4e4ec;--surface:rgba(0,0,0,0.03);--glass:rgba(255,255,255,0.7);--gborder:rgba(0,0,0,0.08);--text:#1a1a2e;--text2:#6b6b80}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background var(--t),color var(--t)}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,var(--primary) 0%,transparent 50%),radial-gradient(ellipse at 80% 50%,var(--accent) 0%,transparent 50%);opacity:0.05;pointer-events:none;z-index:0}
.app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
.header{padding:14px 24px;display:flex;align-items:center;justify-content:space-between;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid var(--gborder);position:sticky;top:0;z-index:100}
.h-left{display:flex;align-items:center;gap:12px}
.h-logo{width:36px;height:36px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:700}
.h-title{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.h-actions{display:flex;gap:8px}
.btn-icon{width:36px;height:36px;border:none;border-radius:var(--rs);background:var(--surface);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all var(--t)}
.btn-icon:hover{background:var(--shover);transform:scale(1.05)}
.hero{padding:28px 24px 8px;text-align:center}
.hero h1{font-size:28px;font-weight:800;margin-bottom:2px;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--text2);font-size:14px}
.input-section{padding:0 24px 12px;display:flex;gap:10px;max-width:700px;margin:0 auto;flex-wrap:wrap}
.input-field{flex:1;min-width:200px;padding:12px 16px;background:var(--surface);border:1px solid var(--gborder);border-radius:var(--rs);color:var(--text);font-size:14px;outline:none;transition:all var(--t)}
.input-field:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--pglow)}
.key-section{max-width:700px;margin:0 auto;padding:0 24px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:center}
.key-input{flex:1;min-width:180px;padding:6px 10px;background:var(--surface);border:1px solid var(--gborder);border-radius:var(--rs);color:var(--text);font-size:11px;outline:none;transition:all var(--t)}
.key-input:focus{border-color:var(--accent)}
.key-input::placeholder{color:var(--text2);font-size:11px}
.key-label{font-size:11px;color:var(--text2);white-space:nowrap}
.key-status{font-size:10px;color:var(--success);display:none}
.btn-primary{padding:12px 24px;background:linear-gradient(135deg,var(--primary),#a29bfe);color:#fff;border:none;border-radius:var(--rs);font-size:14px;font-weight:600;cursor:pointer;transition:all var(--t);white-space:nowrap;display:flex;align-items:center;gap:6px}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 24px var(--pglow)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}
.content{max-width:900px;margin:0 auto;padding:0 24px 40px;display:none}
.content.show{display:block}
.results-section{background:var(--surface);border:1px solid var(--gborder);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.video-hero{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap}
.video-hero img{width:200px;border-radius:var(--rs);flex-shrink:0}
.video-hero-info{flex:1;min-width:200px}
.video-hero-info h2{font-size:20px;font-weight:700;margin-bottom:6px;line-height:1.3}
.video-hero-info .meta{font-size:13px;color:var(--text2);display:flex;gap:16px;flex-wrap:wrap;margin-top:6px}
.meta-item{display:flex;align-items:center;gap:4px}
.score-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;font-size:14px;font-weight:700}
.score-badge.good{background:rgba(0,184,148,0.15);color:var(--success);border:1px solid rgba(0,184,148,0.3)}
.score-badge.ok{background:rgba(253,203,110,0.15);color:var(--warn);border:1px solid rgba(253,203,110,0.3)}
.score-badge.bad{background:rgba(255,107,107,0.15);color:var(--danger);border:1px solid rgba(255,107,107,0.3)}
.checks{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.check{padding:10px 12px;background:var(--bg2);border-radius:var(--rs);border:1px solid var(--gborder);display:flex;align-items:flex-start;gap:10px}
.check-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.check-body{flex:1;min-width:0}
.check-title{font-size:13px;font-weight:600;margin-bottom:1px}
.check-detail{font-size:12px;color:var(--text2);line-height:1.4}
.check-action{font-size:11px;color:var(--primary);margin-top:3px;display:block}
.pass{color:var(--success)}.fail{color:var(--danger)}.warn{color:var(--warn)}
.editor-form{display:flex;flex-direction:column;gap:10px;margin-top:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;font-weight:600;color:var(--text2)}
.form-group textarea,.form-group input{padding:10px 12px;background:var(--bg2);border:1px solid var(--gborder);border-radius:var(--rs);color:var(--text);font-size:13px;outline:none;transition:all var(--t);font-family:inherit}
.form-group textarea:focus,.form-group input:focus{border-color:var(--primary)}
.form-group textarea{resize:vertical;min-height:60px}
.tags-input{display:flex;flex-wrap:wrap;gap:6px;padding:8px 10px;background:var(--bg2);border:1px solid var(--gborder);border-radius:var(--rs);min-height:42px;cursor:text}
.tag{padding:3px 10px;background:var(--primary);color:#fff;border-radius:5px;font-size:12px;display:flex;align-items:center;gap:4px}
.tag button{background:none;border:none;color:#fff;cursor:pointer;font-size:14px;padding:0;line-height:1}
.tag-input-inner{flex:1;min-width:100px;border:none;background:transparent;color:var(--text);font-size:13px;outline:none}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast-container{position:fixed;top:76px;right:16px;z-index:999;display:flex;flex-direction:column;gap:6px}
.toast{padding:10px 16px;border-radius:var(--rs);background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--gborder);color:var(--text);font-size:13px;animation:ti .3s ease,to .3s ease 3.7s forwards;box-shadow:0 8px 32px rgba(0,0,0,0.3);max-width:340px}
@keyframes ti{from{opacity:0;transform:translateX(40px)}to{opacity:1}}
@keyframes to{from{opacity:1}to{opacity:0;transform:translateX(40px)}}
.tab-bar{display:flex;gap:4px;overflow-x:auto;padding:4px;background:var(--surface);border-radius:var(--rs);margin-bottom:12px;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 14px;border:none;border-radius:7px;background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:500;white-space:nowrap;transition:all var(--t);flex-shrink:0}
.tab-btn:hover{color:var(--text);background:var(--shover)}
.tab-btn.active{background:var(--primary);color:#fff}
.tab-body{display:none}
.tab-body.show{display:block}
.source-badge{font-size:11px;padding:2px 10px;border-radius:10px;background:var(--bg2);color:var(--text2);border:1px solid var(--gborder);display:inline-block;margin-bottom:8px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:8px}
.stat-card{padding:10px;background:var(--bg2);border-radius:var(--rs);border:1px solid var(--gborder);text-align:center}
.stat-card .num{font-size:18px;font-weight:700}
.stat-card .lbl{font-size:11px;color:var(--text2);margin-top:1px}
.rec-card{padding:12px;background:linear-gradient(135deg,rgba(108,92,231,0.08),rgba(0,206,201,0.08));border:1px solid var(--gborder);border-radius:var(--rs);margin-top:8px}
.rec-card .rec-title{font-size:13px;font-weight:600;margin-bottom:4px}
.rec-card .rec-body{font-size:12px;color:var(--text2);line-height:1.5}
.auto-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:8px;background:rgba(0,184,148,0.12);color:var(--success)}
.manual-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:2px 8px;border-radius:8px;background:rgba(253,203,110,0.12);color:var(--warn)}
.warn-banner{font-size:12px;padding:10px 14px;background:rgba(253,203,110,0.1);border:1px solid rgba(253,203,110,0.2);border-radius:var(--rs);margin-bottom:12px;display:flex;align-items:flex-start;gap:8px}
.gen-section{padding:12px;background:var(--bg2);border:1px solid var(--gborder);border-radius:var(--rs);margin-top:8px}
.gen-section h4{font-size:13px;font-weight:600;margin-bottom:6px}
.gen-item{padding:10px 12px;background:var(--surface);border:1px solid var(--gborder);border-radius:var(--rs);margin-bottom:6px}
.gen-item:last-child{margin-bottom:0}
.gen-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--accent);margin-bottom:3px}
.gen-value{font-size:13px;line-height:1.5;word-break:break-word}
.gen-value.tag-list{display:flex;flex-wrap:wrap;gap:4px}
.gen-value.tag-list span{padding:2px 8px;background:rgba(108,92,231,0.12);color:var(--primary);border-radius:4px;font-size:11px}
.gen-copy{font-size:10px;color:var(--text2);cursor:pointer;float:right;padding:2px 6px;border-radius:4px;transition:all var(--t)}
.gen-copy:hover{background:var(--shover);color:var(--text)}
.gen-diff{color:var(--success)}
.warn-banner .wb-icon{font-size:16px;flex-shrink:0}
.warn-banner .wb-text{flex:1}
.warn-banner .wb-title{font-weight:600;font-size:12px;margin-bottom:2px}
.warn-banner .wb-body{color:var(--text2);font-size:11px}
@media(max-width:640px){
  .header{padding:12px 16px}
  .h-title{font-size:15px}
  .hero{padding:20px 16px 8px}
  .hero h1{font-size:22px}
  .input-section,.key-section{padding-left:16px;padding-right:16px}
  .input-section{flex-direction:column}
  .input-field{min-width:100%}
  .content{padding:0 16px 30px}
  .video-hero{flex-direction:column}
  .video-hero img{width:100%}
  .results-section{padding:14px}
}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="h-left"><div class="h-logo">▶</div><span class="h-title">YouTube SEO</span></div>
    <div class="h-actions">
      <button class="btn-icon" onclick="toggleTheme()" id="themeBtn" title="Toggle theme">🌙</button>
    </div>
  </header>

  <div class="hero">
    <h1>YouTube SEO Analyzer</h1>
    <p>Analyze & optimize your YouTube video for maximum search visibility</p>
  </div>

  <div class="input-section">
    <input class="input-field" id="urlInput" type="url" placeholder="https://youtu.be/VIDEO_ID or https://youtube.com/watch?v=..." autocomplete="off">
    <button class="btn-primary" id="analyzeBtn" onclick="analyze()">🔍 Analyze</button>
  </div>

  <div class="key-section">
    <span class="key-label">🔑 API Key (optional):</span>
    <input class="key-input" id="apiKey" type="text" placeholder="AIzaSy... — get from console.cloud.google.com" autocomplete="off" spellcheck="false">
    <span class="key-status" id="keyStatus">✅ saved</span>
  </div>

  <div class="content" id="content">
    <div id="mainResults"></div>
  </div>
</div>
<div class="toast-container" id="toast"></div>

<script>
const S={theme:'dark',videoId:null,oembed:null,fullData:null,dataSource:'oembed',tags:[],fetchedTags:null};
function $(id){return document.getElementById(id)}
function qs(s){return document.querySelector(s)}
function toast(m){let c=$('toast'),t=document.createElement('div');t.className='toast';t.textContent=m;c.appendChild(t);setTimeout(()=>t.remove(),4000)}
function toggleTheme(){S.theme=S.theme==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',S.theme==='dark'?'':'light');$('themeBtn').textContent=S.theme==='dark'?'🌙':'☀️'}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtNum(n){if(!n||n==='0')return'—';n=Number(n);if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toString()}
function fmtDur(s){if(!s)return'—';let m=Math.floor(s/60),h=Math.floor(m/60);m=m%60;s=Math.floor(s%60);return h>0?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${m}:${String(s).padStart(2,'0')}`}
function fmtDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})}catch(e){return d}}
function fmtIso(d){if(!d)return null;try{let m=d.match(/PT(\d+H)?(\d+M)?(\d+S)?/);if(!m)return null;let h=parseInt(m[1])||0,mn=parseInt(m[2])||0,s=parseInt(m[3])||0;return h*3600+mn*60+s}catch(e){return null}}

function extractId(url){
  if(!url)return null;
  let u=url.trim();
  let m=u.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|music\.youtube\.com\/watch\?v=|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);
  if(m)return m[1];
  m=u.match(/^([a-zA-Z0-9_-]{11})$/);
  return m?m[1]:null;
}

// =============== DATA SOURCES ===============

async function fetchOembed(videoId){
  let r=await fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${videoId}&format=json`,{signal:AbortSignal.timeout(6000)});
  if(!r.ok)throw new Error('oEmbed failed');
  return r.json();
}

async function checkThumbnail(videoId){
  for(let q of ['maxresdefault','sddefault','hqdefault','mqdefault']){
    try{
      let r=await fetch(`https://i.ytimg.com/vi/${videoId}/${q}.jpg`,{method:'HEAD',signal:AbortSignal.timeout(3000)});
      if(r.ok)return q;
    }catch(e){}
  }
  return null;
}

// YouTube Data API v3 — FULL CORS support
async function fetchDataAPI(videoId,apiKey){
  if(!apiKey)return null;
  let r=await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,statistics&id=${videoId}&key=${apiKey}`,{signal:AbortSignal.timeout(8000)});
  if(!r.ok){
    let e=await r.json().catch(()=>({}));
    throw new Error(e?.error?.message||'Data API error');
  }
  let d=await r.json();
  if(!d.items||!d.items.length)throw new Error('Video not found');
  return d.items[0];
}

// YouTube Inner API via CORS proxy cascade
async function fetchInnerAPI(videoId){
  let proxies=[
    ()=>fetch('https://www.youtube.com/youtubei/v1/player?key=AIzaSyAO_FJ2SlqU8Q4STEHLGCilw_Y9_11qcW8',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId,context:{client:{clientName:'WEB',clientVersion:'2.20250331.00.00',hl:'en',gl:'US'}}}),signal:AbortSignal.timeout(4000)}).then(r=>{if(!r.ok)throw Error();return r.json()}),
    ()=>fetch('https://api.allorigins.win/raw?url='+encodeURIComponent('https://www.youtube.com/youtubei/v1/player?key=AIzaSyAO_FJ2SlqU8Q4STEHLGCilw_Y9_11qcW8'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({videoId,context:{client:{clientName:'WEB',clientVersion:'2.20250331.00.00',hl:'en',gl:'US'}}}),signal:AbortSignal.timeout(8000)}).then(r=>{if(!r.ok)throw Error();return r.json()})
  ];
  for(let p of proxies){
    try{
      let d=await p();
      if(d&&(d.videoDetails||d.title))return d;
    }catch(e){}
  }
  return null;
}

// =============== ANALYSIS ENGINE ===============

function analyzeTitle(title){
  let t=(title||'').trim();
  let r=[];
  if(!t)return [{i:'❌',t:'Title is empty',d:'Title is the most important YouTube SEO factor.',a:'Write a compelling title (40-60 chars) with your target keyword at the front.'}];
  let len=t.length;
  if(len<30)r.push({i:'❌',t:`Too short (${len} chars)`,d:'Aim for 40-60 characters.',a:'Expand the title to include your target keyword and more context.'});
  else if(len<45)r.push({i:'⚠️',t:`Could be longer (${len} chars)`,d:'Optimal: 45-65 characters.',a:'Add a few more descriptive words to improve relevance.'});
  else if(len<70)r.push({i:'✅',t:`Optimal length (${len} chars)`,d:'45-65 is the sweet spot for CTR.',a:'Well optimized for search results display.'});
  else r.push({i:'⚠️',t:`Too long (${len} chars)`,d:'YouTube truncates titles at ~70 chars in most views.',a:'Move important keywords to the first 60 characters.'});
  let fw=t.split(/\s+/).slice(0,3).join(' ');
  if(fw.length>4)r.push({i:'✅',t:'Keywords front-loaded',d:`First words: "${fw.substring(0,35)}"`,a:'Important keywords at the beginning of the title.'});
  else r.push({i:'⚠️',t:'Front-load your best keywords',d:'Put your most important search terms first.',a:'YouTube and Google prioritize the start of the title.'});
  if(/[|–—-]/.test(t))r.push({i:'✅',t:'Clean separator used',d:'Pipes or dashes improve readability.',a:'Good for organizing title structure.'});
  else r.push({i:'💡',t:'Try a pipe separator',d:'"Keyword | Category | Video Name" format works well.',a:'Use | or — to separate ideas in your title.'});
  let upper=(t.match(/[A-Z]/g)||[]).length;
  if(upper>t.length*0.5&&t.length>10)r.push({i:'❌',t:'Excessive CAPS',d:'All-caps titles appear spammy.',a:'Use title case — not ALL CAPS.'});
  if(t.split(/\s+/).length<=3)r.push({i:'⚠️',t:'Too few words',d:`Only ${t.split(/\s+/).length} words.`,a:'Use 5-10 words in your title for best SEO.'});
  let num=(t.match(/\d+/g)||[]).length;
  if(num>0)r.push({i:'✅',t:'Numbers in title',d:'Numbers boost CTR (e.g., "5 Tips", "2024 Guide").',a:'Numbers grab attention in search results.'});
  if(/how|what|why|best|top|guide|tutorial|tips|review|vs|with/i.test(t))r.push({i:'✅',t:'High-CTR power words',d:'Words like "How", "Best", "Guide" improve CTR.',a:'Great word choices for engagement.'});
  return r;
}

function analyzeDescription(desc,autoDesc){
  let d=(desc||autoDesc||'').trim();
  let r=[];
  if(!d)return [{i:'❌',t:'Description is empty',d:'Descriptions help YouTube understand & rank your video.',a:'Write 200+ characters with keywords, timestamps, and links.'}];
  let len=d.length;
  if(len<200)r.push({i:'❌',t:`Very short (${len} chars)`,d:'Aim for at least 200 characters.',a:'Expand your description with relevant context and keywords.'});
  else if(len<500)r.push({i:'⚠️',t:`Could be longer (${len} chars)`,d:'Optimal: 500-2000 characters.',a:'Add more details, timestamps, and social links.'});
  else if(len<2000)r.push({i:'✅',t:`Good length (${len} chars)`,d:'Well within the optimal range.',a:'Great balance of detail and readability.'});
  else r.push({i:'✅',t:`Comprehensive (${len} chars)`,d:'Detailed descriptions rank better.',a:'Excellent — this level of detail helps both users and search.'});
  let links=(d.match(/https?:\/\/[^\s]+/g)||[]);
  if(links.length>0)r.push({i:'✅',t:`${links.length} link(s) found`,d:'Links improve engagement and traffic.',a:'Put your most important links in the first 2 lines.'});
  else r.push({i:'⚠️',t:'No links in description',d:'Link to your website, social media, or related videos.',a:'Add 2-3 relevant links.'});
  let hashtags=(d.match(/#[a-zA-Z0-9_]+/g)||[]);
  if(hashtags.length>0)r.push({i:hashtags.length<=15?'✅':'⚠️',t:`${hashtags.length} hashtag(s)`,d:hashtags.length>15?'Max 15 tags shown.':'Hashtags boost discovery.',a:hashtags.length>15?'Stick to 3-5 hashtags.':'Good — use 3-5 relevant hashtags.'});
  else r.push({i:'💡',t:'Add hashtags',d:'Hashtags help YouTube categorize your video.',a:'Add 3-5 hashtags (e.g., #tutorial #SEO).'});
  let ts=d.match(/\d+:\d+/g);
  if(ts&&ts.length>=2)r.push({i:'✅',t:`${ts.length} timestamps`,d:'Chapter markers improve search indexing.',a:'Timestamps create video chapters in YouTube search results.'});
  else if(ts&&ts.length===1)r.push({i:'💡',t:'More timestamps needed',d:'Add 3+ chapter markers for best results.',a:'Add timestamps like 0:00 Intro, 1:30 Main Topic, 5:00 Conclusion.'});
  else r.push({i:'💡',t:'No timestamps',d:'Chapters improve user experience and SEO.',a:'Add 3-5 timestamps. Videos with chapters get more search visibility.'});
  let words=d.toLowerCase().replace(/https?:\/\/[^\s]+/g,'').split(/\s+/).filter(w=>w.length>2&&!/^[#@]/.test(w));
  let stop=new Set('the and for are was you all can has had not its but any how our out use may now see get who try her his its own did got set put say she too per via etc this that'.split(' '));
  let freq={};
  words.forEach(w=>{w=w.replace(/[^a-z0-9]/g,'');if(w.length>2&&!stop.has(w))freq[w]=(freq[w]||0)+1});
  let top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,3);
  if(top.length)r.push({i:'✅',t:'Top keywords in description',d:top.map(([w,c])=>`"${w}" (${c}x)`).join(' · '),a:'Use your primary keyword in the first 25 words for best ranking.'});
  let firstLine=d.split('\n')[0]||'';
  let firstWords=firstLine.toLowerCase().split(/\s+/).filter(w=>w.length>3).slice(0,5);
  if(firstWords.length>2)r.push({i:'✅',t:'Keywords in first sentence',d:`"${firstWords.join(' ').substring(0,40)}..."`,a:'Your primary keyword appears naturally in the opening.'});
  else r.push({i:'💡',t:'Keyword in first 25 words',d:'The first 1-2 sentences carry the most SEO weight.',a:'Include your target keyword naturally in the first sentence.'});
  return r;
}

function analyzeTags(tags,fetchedTags){
  let t=tags&&tags.length?tags:(fetchedTags||[]);
  let r=[];
  let count=t.length;
  if(count===0)return [{i:'❌',t:'No tags found',d:'Tags help YouTube understand your video content.',a:'Add 5-15 relevant tags including variations of your target keyword.'}];
  if(count<5)r.push({i:'⚠️',t:`Only ${count} tags`,d:'Aim for 5-15 tags for best discoverability.',a:'Add more specific, relevant tags.'});
  else if(count<=15)r.push({i:'✅',t:`Optimal count (${count})`,d:'5-15 tags is the sweet spot.',a:'Well optimized tag count!'});

}

function generateRecommendations(results){
  let fails=[]; let warns=[];
  Object.values(results).forEach(arr=>arr.forEach(i=>{
    if(i.i==='❌')fails.push(i);else if(i.i==='⚠️'||i.i==='💡')warns.push(i);
  }));
  let recs=[];
  if(fails.length>=3)recs.push({title:'🔴 Critical improvements needed',body:`Fix ${fails.length} critical issues first: ${fails.slice(0,3).map(i=>i.t).join(', ')}. These have the biggest impact on your search ranking.`});
  if(fails.length>0&&fails.length<3)recs.push({title:'⚠️ Fix these issues',body:`${fails.map(i=>i.t).join(' · ')}. Addressing these will improve your video's SEO score.`});
  let noDesc=results.description?.some(i=>i.i==='❌'&&i.t.includes('empty'));
  let noTags=results.tags?.some(i=>i.i==='❌'&&i.t.includes('No tags'));
  if(noDesc||noTags)recs.push({title:'📝 Complete your metadata',body:'Adding a description and tags is the #1 way to improve YouTube SEO. Take 5 minutes to write 200+ chars of description and 5-15 tags.'});
  let shortTitle=results.title?.some(i=>i.i==='❌'&&i.t.includes('too short'));
  if(shortTitle)recs.push({title:'🎯 Rewrite your title',body:'Your title is the most visible element in search. Include your target keyword in the first 3-4 words and keep it under 65 characters.'});
  let lowThumb=results.thumbnail?.some(i=>i.i!=='✅');
  if(lowThumb)recs.push({title:'🖼️ Upgrade your thumbnail',body:'Custom HD thumbnails (1280×720) increase CTR by 30%+. Use a close-up face, bold text overlay, and high contrast colors.'});
  let lowEngagement=results.engagement?.some(i=>i.t.includes('unavailable'));
  if(lowEngagement)recs.push({title:'❤️ Boost engagement',body:'Ask viewers to like, comment, and subscribe at the start and end of your video. Pin a comment with a question.'});
  if(recs.length===0)recs.push({title:'🌟 Great job!',body:'Your video SEO looks solid. Keep monitoring YouTube Studio for audience retention data and iterate on what works.'});

// =============== GENERATION ENGINE ===============

function extractKeywords(title,desc,tags,category){
  let words=new Set();
  if(title)title.split(/\s+/).filter(w=>w.length>3).forEach(w=>words.add(w.toLowerCase().replace(/[^a-z0-9]/g,'')));
  if(desc)(desc.match(/\b[A-Za-z]{4,}\b/g)||[]).forEach(w=>words.add(w.toLowerCase()));
  if(tags)tags.forEach(t=>t.split(/\s+/).filter(w=>w.length>3).forEach(w=>words.add(w.toLowerCase().replace(/[^a-z0-9]/g,''))));
  let stop=new Set(['this','that','with','from','your','have','been','they','will','what','about','some','them','than','into','also','more','then','just','like','make','know','very','well','even','want','only','much','over']);
  return [...words].filter(w=>!stop.has(w)&&w.length>3).slice(0,15);
}

function generateTitleSuggestions(vd){
  let t=vd.title||'';
  let kw=extractKeywords(t,vd.description,vd.tags,vd.category);
  let primary=kw[0]||'content';
  let secondary=kw[1]||'guide';
  let suggestions=[];
  let titleLower=t.toLowerCase();

  let catWords={
    'Music':['Song','Music','Audio','Track','Official Video'],
    'Education':['Tutorial','Guide','Lesson','Course','Class'],
    'Science & Technology':['Review','Tutorial','Explained','Guide','Tips'],
    'Howto & Style':['Tutorial','Guide','Tips','How to','Ideas'],
    'Gaming':['Gameplay','Walkthrough','Review','Tips','Guide'],
    'Entertainment':['Funny','Best','Crazy','Amazing','Moments'],
    'Comedy':['Funny','Hilarious','Best','Crazy','Compilation'],
    'Sports':['Highlights','Best','Moments','Skills','Training'],
    'News & Politics':['Update','Analysis','Report','Breaking','Explained'],
    'Travel & Events':['Vlog','Travel Guide','Adventure','Tips','Best'],
    'People & Blogs':['Vlog','Daily','Week','Life Update','Routine'],
    'Pets & Animals':['Funny','Cute','Amazing','Best','Adorable'],
  };
  let cw=catWords[vd.category]||['Guide','Tips','Review','Tutorial','Ideas'];
  let cwIdx=Math.floor(Math.random()*cw.length);

  if(t&&!titleLower.includes('how to')&&primary){
    suggestions.push({title:`How to ${primary}${secondary?' | '+secondary:''}`,why:'"How to" titles get 2x more clicks and rank well for question-based searches.'});
  }
  if(t&&primary){
    let num=Math.floor(Math.random()*8)+3;
    suggestions.push({title:`${num} ${primary} ${cw[cwIdx]}${secondary?' - '+secondary:''}`,why:'Numbered lists boost CTR by 36%. Numbers stand out in search results.'});
  }
  if(t){
    let parts=t.split(/[|–—-]/);
    let base=parts[0].trim();
    if(base.length>30){
      suggestions.push({title:`${primary}: ${secondary||'Complete Guide'} | ${cw[cwIdx%cw.length]} ${new Date().getFullYear()}`,why:'Clear keyword-first structure with pipe separator. Front-loads the primary keyword.'});
    }else if(base.length<40){
      suggestions.push({title:`${base} | ${cw[(cwIdx+1)%cw.length]} & ${cw[(cwIdx+2)%cw.length]}`,why:'Adding a pipe separator improves readability and can include more keywords.'});
    }
  }
  if(t&&!/\d{4}/.test(t)){
    suggestions.push({title:`${t.replace(/[|–—-].*$/,'').trim()} | ${cw[(cwIdx+2)%cw.length]} ${new Date().getFullYear()}`,why:'Adding the current year signals freshness and recency to searchers.'});
  }
  if(t&&kw.length>2){
    suggestions.push({title:`${kw[0]} vs ${kw[1]}: ${kw.slice(2,4).join(' & ')} | Which is ${kw[2]||'Better'}?`,why:'Comparison titles ("X vs Y") have high click-through rates for informational content.'});
  }
  if(t&&!titleLower.startsWith('how')&&!titleLower.startsWith('what')&&!titleLower.startsWith('why')){
    let qWords=['What','Why','How','When','Where'];
    let q=qWords[Math.floor(Math.random()*qWords.length)];
    suggestions.push({title:`${q} ${primary}${secondary?' '+secondary:''}? ${cw[cwIdx%cw.length]} Explained`,why:'Question-based titles match voice search and featured snippet intent.'});
  }
  suggestions=suggestions.slice(0,6);
  suggestions.forEach(s=>{
    if(s.title.length>70)s.title=s.title.substring(0,67)+'...';
  });
  return suggestions;
}

function generateDescription(vd){
  let t=vd.title||'';
  let kw=extractKeywords(t,vd.description,vd.tags,vd.category);
  let primary=kw[0]||'this content';
  let secondary=kw[1]||'';
  let dur=vd.lengthSeconds;
  let durMin=dur?Math.round(dur/60):null;

  let lines=[];
  lines.push(`In this video, we dive deep into ${primary}${secondary?' and '+secondary:''}. Whether you're a beginner or looking to level up, you'll find actionable tips and strategies to help you succeed.`);
  lines.push('');
  if(durMin&&durMin>3){
    lines.push(`📌 TIMESTAMPS:`);
    lines.push(`0:00 - Introduction`);
    let sections=Math.min(5,Math.max(2,Math.floor(durMin/3)));
    for(let i=1;i<=sections;i++){
      let min=Math.floor(durMin*i/(sections+1));
      let sec=String(Math.floor(Math.random()*60)).padStart(2,'0');
      lines.push(`${min}:${sec} - ${kw[i%kw.length]||'Key Point '+(i)}`);
    }
    lines.push(`${durMin}:00 - Conclusion & Next Steps`);
    lines.push('');
  }
  lines.push(`🔗 RESOURCES & LINKS:`);
  lines.push(`📺 Subscribe for more ${primary} content: [YOUR_CHANNEL_LINK]`);
  lines.push(`🌐 Website: [YOUR_WEBSITE]`);
  lines.push(`📸 Instagram: [YOUR_INSTAGRAM]`);
  lines.push(`🐦 Twitter/X: [YOUR_TWITTER]`);
  lines.push('');
  lines.push(`👍 If you found this helpful, please LIKE and SUBSCRIBE for more ${primary}${secondary?' and '+secondary:''} content!`);
  lines.push(`💬 Comment below: What's your biggest challenge with ${primary}?`);
  lines.push('');
  let catHashtag=vd.category?vd.category.replace(/[^a-zA-Z0-9]/g,'').toLowerCase():'video';
  let allHashtags=[primary,secondary,...kw.slice(0,3)].filter(Boolean).map(w=>'#'+w.replace(/[^a-zA-Z0-9]/g,''));
  allHashtags.push('#'+catHashtag,'#YouTubeSEO','#VideoTips');
  lines.push([...new Set(allHashtags)].slice(0,8).join(' '));

  return lines.join('\n');
}

function generateTags(vd){
  let t=vd.title||'';
  let kw=extractKeywords(t,vd.description,vd.tags,vd.category);
  let tags=new Set();

  if(t){
    t.split(/[|–—-]/).forEach(part=>{
      let trimmed=part.trim();
      if(trimmed.length>3&&trimmed.length<60)tags.add(trimmed);
    });
  }
  kw.forEach(w=>{
    tags.add(w);
    if(w.endsWith('s'))tags.add(w.slice(0,-1));
    if(!w.endsWith('s'))tags.add(w+'s');
  });
  let categoryTags={
    'Music':['new song','official music video','song lyrics','artist name','album track'],
    'Education':['online course','learn online','educational video','study tips','skill development'],
    'Science & Technology':['tech review','gadgets','technology news','science explained','innovation'],
    'Howto & Style':['diy tutorial','step by step','beginner guide','easy tutorial','how to make'],
    'Gaming':['gaming','gameplay walkthrough','gaming tips','pro guide','game review'],
    'Entertainment':['entertainment','viral video','trending','fun content','watch this'],
    'Comedy':['funny video','comedy sketch','hilarious','laugh','comedy'],
    'Sports':['sports highlights','training tips','athlete','workout','fitness'],
    'Travel & Events':['travel vlog','wanderlust','travel guide','vacation','adventure travel'],
    'People & Blogs':['vlog','daily life','personal story','lifestyle','my story'],
  };
  let ct=categoryTags[vd.category]||['tutorial','guide','tips','how to','beginners'];
  ct.forEach(t=>tags.add(t));

  let basePhrases=[`${kw[0]||'content'} tutorial`,`${kw[0]||'content'} guide`,`${kw[0]||'content'} tips`,`how to ${kw[0]||'learn'}`,`best ${kw[0]||'content'} ${new Date().getFullYear()}`];
  basePhrases.forEach(p=>{if(p.length<60)tags.add(p)});

  return [...tags].filter(t=>t.length>2&&t.length<60).slice(0,20);
}

function generateHashtags(vd){
  let kw=extractKeywords(vd.title,vd.description,vd.tags,vd.category);
  let hashtags=kw.slice(0,4).map(w=>'#'+w.replace(/[^a-zA-Z0-9]/g,''));
  if(vd.category)hashtags.push('#'+vd.category.replace(/[^a-zA-Z0-9]/g,'').toLowerCase());
  hashtags.push('#YouTubeSEO','#VideoMarketing','#ContentCreator');
  return [...new Set(hashtags)].slice(0,8);
}

function generateThumbnailText(vd){
  let kw=extractKeywords(vd.title,vd.description,vd.tags,vd.category);
  let primary=kw[0]||'';
  let suggestions=[];

  if(primary){
    suggestions.push({text:primary.toUpperCase(),why:'Single powerful keyword — clean and bold.'});
  }
  if(vd.title){
    let words=vd.title.split(/\s+/).filter(w=>w.length>2).slice(0,3);
    if(words.length>=2)suggestions.push({text:words.slice(0,2).join(' ').toUpperCase(),why:'Two-word phrase from your title — maintains relevance.'});
    if(words.length>=3&&!/\d/.test(words.join('')))suggestions.push({text:words.slice(0,2).join(' ').toUpperCase()+'?',why:'Question format sparks curiosity and boosts CTR.'});
  }
  let num=vd.tags?vd.tags.filter(t=>/\d/.test(t)).map(t=>t.match(/\d+/)?.[0]).filter(Boolean).pop():null;
  if(num)suggestions.push({text:num+' '+primary.toUpperCase(),why:'Number + keyword — highly effective for list/tutorial content.'});

  let year=new Date().getFullYear();
  suggestions.push({text:primary.toUpperCase()+' '+year,why:'Including the year signals fresh, up-to-date content.'});

  return suggestions.slice(0,5);
}

function generateSEOCopy(vd){
  return {
    titles:generateTitleSuggestions(vd),
    description:generateDescription(vd),
    tags:generateTags(vd),
    hashtags:generateHashtags(vd),
    thumbText:generateThumbnailText(vd),
  };
}

async function analyze(){
  let url=$('urlInput').value.trim();
  if(!url){toast('Enter a YouTube URL');return}
  let videoId=extractId(url);
  if(!videoId){toast('Invalid YouTube URL');return}

  let apiKey=$('apiKey').value.trim();
  if(apiKey){
    try{localStorage.setItem('ytseo_key',apiKey);$('keyStatus').style.display='inline'}catch(e){}
  }

  let btn=$('analyzeBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Fetching...';
  S.videoId=videoId;
  S.tags=[]; S.fetchedTags=null; S.oembed=null; S.fullData=null; S.dataSource='oembed';

  try{
    let [oembed,thumbQual]=await Promise.all([
      fetchOembed(videoId),
      checkThumbnail(videoId)
    ]);
    S.oembed=oembed;

    let fullData=null;
    let usedAPI=false;

    // Try Data API v3 first (CORS-friendly, needs key)
    if(apiKey){
      try{
        let item=await fetchDataAPI(videoId,apiKey);
        if(item){
          let sn=item.snippet||{};
          let st=item.statistics||{};
          let cd=item.contentDetails||{};
          fullData={
            title:sn.title,
            author:sn.channelTitle,
            description:sn.description,
            keywords:sn.tags||[],
            viewCount:st.viewCount,
            likeCount:st.likeCount,
            commentCount:st.commentCount,
            lengthSeconds:fmtIso(cd.duration),
            duration:fmtIso(cd.duration),
            category:sn.categoryId,
            publishDate:sn.publishedAt,
            publishedAt:sn.publishedAt,
            subCount:null
          };
          S.dataSource='api';
          usedAPI=true;
          if(sn.tags&&sn.tags.length)S.fetchedTags=sn.tags;
          toast('✅ Full data from YouTube API! Description, tags, views, likes, duration auto-detected.');
        }
      }catch(e){
        toast('API key error: '+e.message);
      }
    }

    // Fallback: try Inner API via proxy
    if(!fullData){
      try{
        fd=await fetchInnerAPI(videoId);
        if(fd){
          let vd=fd.videoDetails||{};
          let mf=fd.microformat?.playerMicroformatRenderer||{};
          fullData={
            title:vd.title,
            author:vd.author,
            description:vd.shortDescription||mf?.description?.simpleText||'',
            keywords:vd.keywords||[],
            viewCount:vd.viewCount,
            likeCount:null,
            commentCount:null,
            lengthSeconds:vd.lengthSeconds,
            duration:vd.lengthSeconds,
            category:mf?.category,
            publishDate:mf?.publishDate,
            publishedAt:mf?.publishDate,
            subCount:null
          };
          S.dataSource='inner';
          if(vd.keywords&&vd.keywords.length)S.fetchedTags=vd.keywords;
          if(!usedAPI)toast('Auto-detected: title, desc, tags, duration from Inner API.');
        }
      }catch(e){}
    }

    if(fullData){
      S.fullData=fullData;
    }

    runFullAnalysis(videoId,thumbQual);
  }catch(e){
    toast('Could not fetch video: '+(e.message||'Unknown error'));
    showManualForm(videoId);
  }

  btn.disabled=false;
  btn.innerHTML='🔍 Analyze';
}

function buildVideoData(videoId,thumbQual){
  let o=S.oembed,fd=S.fullData;
  return {
    title:fd?.title||o?.title||'',
    author:o?.author_name||fd?.author||'Unknown',
    authorUrl:o?.author_url||'',
    thumbUrl:o?.thumbnail_url||`https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`,
    thumbQual:thumbQual||'unknown',
    description:(fd?.description||'').trim(),
    tags:fd?.keywords||[],
    viewCount:fd?.viewCount||fd?.views||null,
    likeCount:fd?.likeCount||fd?.likes||null,
    commentCount:fd?.commentCount||null,
    lengthSeconds:fd?.lengthSeconds||fd?.duration||null,
    category:fd?.category||null,
    publishDate:fd?.publishDate||fd?.uploadDate||fd?.publishedAt||null,
    subs:fd?.subCount||null,
    hasFullData:!!fd,
    source:S.dataSource
  };
}

function runFullAnalysis(videoId,thumbQual){
  let vd=buildVideoData(videoId,thumbQual);
  S.fetchedTags=vd.tags&&vd.tags.length?vd.tags:null;

  let results={
    title:analyzeTitle(vd.title),
    description:analyzeDescription('',vd.description),
    tags:analyzeTags([],vd.tags),
    thumbnail:analyzeThumbnail(vd.thumbQual),
    channel:analyzeChannel(S.oembed,S.fullData),
    engagement:analyzeEngagement(vd),
    duration:analyzeDuration(vd),
    published:analyzePublishDate(vd),
    category:analyzeCategory(vd),
  };

  let recs=generateRecommendations(results);
  showResults(results,recs,vd,videoId);
}

function showResults(results,recs,vd,videoId){
  $('content').classList.add('show');

  let all=[]; Object.values(results).forEach(a=>all.push(...a));
  let total=all.length;
  let passed=all.filter(i=>i.i==='✅').length;
  let warned=all.filter(i=>i.i==='⚠️'||i.i==='💡').length;
  let failed=all.filter(i=>i.i==='❌').length;
  let score=total?Math.round(passed/total*100):0;
  let grade=score>=80?'good':score>=50?'ok':'bad';
  let gradeText=score>=80?'Great SEO!':score>=50?'Needs Work':'Critical';

  let tabKeys=['title','description','tags','thumbnail','generate','channel','engagement','duration','published','category'];
  let tabLabels={title:'🎯 Title',description:'📝 Description',tags:'🏷️ Tags',thumbnail:'🖼️ Thumbnail',generate:'✨ Generate','channel':'📺 Channel',engagement:'❤️ Engagement',duration:'⏱️ Duration',published:'📅 Published',category:'📂 Category'};
  let hasDesc=vd.description.length>0;
  let hasTags=vd.tags&&vd.tags.length>0;
  let autoStr=vd.source==='api'?'✅ YouTube Data API v3':vd.source==='inner'?'⚙️ Inner API (proxy)':'🔗 oEmbed';
  let noKey=vd.source==='oembed'&&!(hasDesc&&hasTags);

  $('mainResults').innerHTML=`
    <div class="results-section">
      <div class="video-hero">
        <img src="${vd.thumbUrl}" alt="" crossorigin="anonymous">
        <div class="video-hero-info">
          <h2>${esc(vd.title||'Untitled Video')}</h2>
          <div class="meta">
            <span class="score-badge ${grade}">${score}/100 · ${gradeText}</span>
            <span class="meta-item">👤 ${esc(vd.author)}</span>
            ${vd.lengthSeconds?`<span class="meta-item">⏱️ ${fmtDur(vd.lengthSeconds)}</span>`:''}
            ${vd.viewCount?`<span class="meta-item">👁️ ${fmtNum(vd.viewCount)}</span>`:''}
          </div>
          <div class="meta">
            <span class="meta-item">✅ ${passed} pass</span>
            <span class="meta-item">⚠️ ${warned} warnings</span>
            <span class="meta-item">❌ ${failed} fails</span>
            <span class="meta-item" style="font-size:11px;color:var(--accent)">${autoStr}</span>
          </div>
        </div>
      </div>
      ${noKey?`
      <div class="warn-banner">
        <span class="wb-icon">ℹ️</span>
        <div class="wb-text">
          <div class="wb-title">Manual input needed for description &amp; tags</div>
          <div class="wb-body">Without a YouTube Data API key, description, tags, views, likes, and comments cannot be auto-detected due to browser CORS restrictions. <strong>Add a free API key above</strong> for full auto-detection, or enter details manually below.</div>
        </div>
      </div>
      <div style="margin-top:8px">
        <div class="editor-form">
          <div class="form-group">
            <label>Description <span class="manual-badge">manual</span></label>
            <textarea id="editDesc" rows="3" placeholder="Paste video description..." style="font-size:12px"></textarea>
          </div>
          <div class="form-group">
            <label>Tags <span class="manual-badge">manual</span></label>
            <div class="tags-input" id="tagsContainer" onclick="document.getElementById('tagInput').focus()">
              <input class="tag-input-inner" id="tagInput" placeholder="Type tag, press Enter..." onkeydown="tagKeydown(event)">
            </div>
          </div>
          <button class="btn-primary" style="font-size:12px;padding:8px 16px" onclick="reanalyze('${videoId}')">🔄 Re-analyze with input</button>
        </div>
      </div>`:''}
      ${!noKey&&(!hasDesc||!hasTags)?`
      <div style="margin-top:8px;padding:8px 10px;background:rgba(0,184,148,0.08);border:1px solid rgba(0,184,148,0.15);border-radius:var(--rs);font-size:12px;color:var(--text2)">
        ✅ All metadata auto-detected. You can still edit below for custom analysis.
      </div>`:''}
    </div>

    <div class="results-section">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px">📋 Recommendations</div>
      ${recs.map(r=>`
        <div class="rec-card">
          <div class="rec-title">${r.title}</div>
          <div class="rec-body">${r.body}</div>
        </div>
      `).join('')}
    </div>

    <div class="tab-bar">
      ${tabKeys.map((k,i)=>`<button class="tab-btn${i===0?' active':''}" data-tab="res-${k}" onclick="switchTab('res-${k}')">${tabLabels[k]}</button>`).join('')}
    </div>

    ${tabKeys.map((k,i)=>{
      if(k==='generate'){
        return `
      <div class="tab-body" id="res-generate">
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:12px">
          <button class="btn-primary" style="font-size:13px;padding:10px 20px" onclick="generateSEO()">✨ Generate SEO Content</button>
          <span style="font-size:11px;color:var(--text2)">Auto-generates optimized title, description, tags, hashtags &amp; thumbnail text based on your video data.</span>
        </div>
        <div id="genOutput">
          <div style="padding:20px;text-align:center;color:var(--text2);font-size:13px">
            Click "Generate SEO Content" to create AI-optimized metadata suggestions.
          </div>
        </div>
      </div>`;
      }
      return `
      <div class="tab-body${i===0?' show':''}" id="res-${k}">
        <div class="source-badge">${k==='description'&&!hasDesc?'✏️ manual input':k==='tags'&&!hasTags?'✏️ manual input':autoStr}</div>
        <div class="checks">
          ${(results[k]||[]).map(item=>`
            <div class="check">
              <div class="check-icon ${item.i==='✅'?'pass':item.i==='❌'?'fail':'warn'}">${item.i}</div>
              <div class="check-body">
                <div class="check-title">${item.t}</div>
                ${item.d?`<div class="check-detail">${item.d}</div>`:''}
                ${item.a?`<div class="check-action">💡 ${item.a}</div>`:''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
    }).join('')}
  `;

  $('content').scrollIntoView({behavior:'smooth',block:'start'});
}

function reanalyze(videoId){
  let descInput=$('editDesc');
  let desc=descInput?descInput.value:'';
  let allTags=S.tags.length?[...S.tags]:S.fetchedTags?[...S.fetchedTags]:[];

  let vd=buildVideoData(videoId,'maxresdefault');
  if(desc)vd.description=desc;
  if(allTags.length)vd.tags=allTags;

  let results={
    title:analyzeTitle(vd.title),
    description:analyzeDescription(desc||'',vd.description),
    tags:analyzeTags(allTags,[]),
    thumbnail:analyzeThumbnail(vd.thumbQual),
    channel:analyzeChannel(S.oembed,S.fullData),
    engagement:analyzeEngagement(vd),
    duration:analyzeDuration(vd),
    published:analyzePublishDate(vd),
    category:analyzeCategory(vd),
  };

  let recs=generateRecommendations(results);
  S.tags=allTags;
  showResults(results,recs,vd,videoId);
}

function showManualForm(videoId){
  $('content').classList.add('show');
  $('mainResults').innerHTML=`
    <div class="results-section">
      <h3 style="font-size:15px;font-weight:600;margin-bottom:8px">🎬 Video: ${videoId}</h3>
      <p style="font-size:12px;color:var(--text2);margin-bottom:12px">Could not auto-fetch. Enter details manually for SEO analysis.</p>
      <div class="editor-form">
        <div class="form-group">
          <label>Video Title</label>
          <input type="text" id="editTitle" maxlength="100" placeholder="Enter video title...">
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="editDesc" rows="4" placeholder="Paste video description..."></textarea>
        </div>
        <div class="form-group">
          <label>Tags</label>
          <div class="tags-input" id="tagsContainer" onclick="document.getElementById('tagInput').focus()">
            <input class="tag-input-inner" id="tagInput" placeholder="Type tag, press Enter..." onkeydown="tagKeydown(event)">
          </div>
        </div>
        <button class="btn-primary" onclick="manualAnalyze('${videoId}')">🚀 Analyze with Manual Data</button>
      </div>
    </div>
  `;
}

function manualAnalyze(videoId){
  let title=($('editTitle')?.value||'').trim();
  let desc=($('editDesc')?.value||'').trim();
  let allTags=[...S.tags];
  if(!title&&!desc&&!allTags.length){toast('Enter at least a title');return}

  let vd={title,author:'Unknown',authorUrl:'',thumbUrl:`https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`,thumbQual:'unknown',description:desc,tags:allTags,viewCount:null,likeCount:null,commentCount:null,lengthSeconds:null,category:null,publishDate:null,subs:null,hasFullData:false,source:'manual'};
  S.oembed={author_name:'Unknown',author_url:'',thumbnail_url:vd.thumbUrl,title};

  let results={
    title:analyzeTitle(title),
    description:analyzeDescription(desc,''),
    tags:analyzeTags(allTags,[]),
    thumbnail:analyzeThumbnail(null),
    channel:[{i:'💡',t:'Channel info not provided',d:'Enter channel name manually.',a:'Channel optimization matters for search.'}],
    engagement:[{i:'💡',t:'Engagement data not provided',d:'Manual analysis only.',a:'Check YouTube Studio for views, likes, and CTR.'}],
    duration:[{i:'💡',t:'Duration not provided',d:'Enter video length manually.',a:'10-20 min is ideal for search ranking.'}],
    published:[{i:'💡',t:'Publish date not provided',d:'Enter date for age analysis.',a:'Newer videos get a temporary ranking boost.'}],
    category:[{i:'💡',t:'Category not provided',d:'Choose a category in YouTube Studio.',a:'The right category improves recommendations.'}],
  };

  let recs=generateRecommendations(results);
  showResults(results,recs,vd,videoId);
}

function generateSEO(){
  let vd=buildVideoData(S.videoId,'maxresdefault');
  if(!vd.title){toast('Need a title to generate SEO content');return}

  let gen=generateSEOCopy(vd);
  let desc=gen.description;
  let descPreview=desc.split('\n').slice(0,3).join('\n')+'...';

  $('genOutput').innerHTML=`
    <div class="gen-section">
      <h4>🎯 Title Suggestions</h4>
      ${gen.titles.map((s,i)=>`
        <div class="gen-item">
          <span class="gen-copy" onclick="copyText('${esc(s.title)}')">📋 copy</span>
          <div class="gen-label">Option ${i+1}</div>
          <div class="gen-value">${esc(s.title)}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:3px">💡 ${s.why}</div>
        </div>
      `).join('')}
    </div>

    <div class="gen-section">
      <h4>📝 Description Template</h4>
      <div class="gen-item">
        <span class="gen-copy" onclick="copyText(${JSON.stringify(desc)})">📋 copy</span>
        <div class="gen-label">SEO-Optimized Description</div>
        <div class="gen-value" style="white-space:pre-wrap;font-size:12px">${esc(desc)}</div>
      </div>
    </div>

    <div class="gen-section">
      <h4>🏷️ Tags (${gen.tags.length})</h4>
      <div class="gen-item">
        <span class="gen-copy" onclick="copyText('${esc(gen.tags.join(', '))}')">📋 copy</span>
        <div class="gen-label">Recommended Tags</div>
        <div class="gen-value tag-list">${gen.tags.map(t=>`<span>${esc(t)}</span>`).join('')}</div>
      </div>
    </div>

    <div class="gen-section">
      <h4>#️⃣ Hashtags</h4>
      <div class="gen-item">
        <span class="gen-copy" onclick="copyText('${esc(gen.hashtags.join(' '))}')">📋 copy</span>
        <div class="gen-label">Description Hashtags</div>
        <div class="gen-value">${esc(gen.hashtags.join(' '))}</div>
      </div>
    </div>

    <div class="gen-section">
      <h4>🖼️ Thumbnail Text Overlay</h4>
      ${gen.thumbText.map((s,i)=>`
        <div class="gen-item">
          <span class="gen-copy" onclick="copyText('${esc(s.text)}')">📋 copy</span>
          <div class="gen-label">Option ${i+1}</div>
          <div class="gen-value" style="font-size:16px;font-weight:700">${esc(s.text)}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:3px">💡 ${s.why}</div>
        </div>
      `).join('')}
    </div>
  `;
  switchTab('res-generate');
  toast('✅ SEO content generated!');
}

function copyText(t){
  navigator.clipboard.writeText(t).then(()=>toast('📋 Copied!')).catch(()=>{
    let ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('📋 Copied!');
  });
}

function switchTab(id){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  qs(`.tab-btn[data-tab="${id}"]`)?.classList.add('active');
  document.querySelectorAll('.tab-body').forEach(b=>b.classList.remove('show'));
  $(id)?.classList.add('show');
}

// Tags
function addTag(t){
  let v=t.trim();
  if(!v||S.tags.includes(v))return;
  S.tags.push(v);
  renderTags();
}
function removeTag(t){
  S.tags=S.tags.filter(x=>x!==t);
  renderTags();
}
function tagKeydown(e){
  if(e.key==='Enter'||e.key===','){
    e.preventDefault();
    let inp=$('tagInput');
    if(inp&&inp.value.trim()){addTag(inp.value);inp.value=''}
  }
}
function renderTags(){
  let c=$('tagsContainer');
  if(!c)return;
  let inp=c.querySelector('.tag-input-inner');
  c.innerHTML=S.tags.map(t=>`<span class="tag">${esc(t)} <button onclick="removeTag('${esc(t)}')">×</button></span>`).join('');
  if(inp){c.appendChild(inp);inp.focus()}
}

// Init
document.addEventListener('DOMContentLoaded',()=>{
  document.documentElement.setAttribute('data-theme','');
  try{
    let saved=localStorage.getItem('ytseo_key');
    if(saved){$('apiKey').value=saved;$('keyStatus').style.display='inline'}
  }catch(e){}
});
$('urlInput').addEventListener('keydown',e=>{if(e.key==='Enter')analyze()});
$('apiKey').addEventListener('input',function(){
  if(this.value.trim())try{localStorage.setItem('ytseo_key',this.value.trim());$('keyStatus').style.display='inline'}catch(e){}
});
</script>
